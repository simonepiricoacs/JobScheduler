#============================================================================
# Water JobScheduler - Quartz Scheduler Configuration
#
# Ported from: it.acsoftware.hyperiot.scheduler.cfg (HyperIoT Framework)
# Adapted for: Water Framework (no JNDI/JTA - uses direct JDBC)
#============================================================================

#============================================================================
# Configure Quartz Scheduler Instance
#============================================================================
org.quartz.scheduler.instanceName=WaterJobScheduler
org.quartz.scheduler.instanceId=AUTO

#============================================================================
# Configure ThreadPool
#============================================================================
org.quartz.threadPool.class=org.quartz.simpl.SimpleThreadPool
org.quartz.threadPool.threadCount=10
org.quartz.threadPool.threadPriority=5

#============================================================================
# Configure Job Store
#
# Default: in-memory RAM store (no persistence, jobs lost on restart).
# Suitable for development or stateless scheduling.
#
# For production with job persistence, switch to JDBC store:
# uncomment the JDBC section below and comment out the RAM store line.
#============================================================================
org.quartz.jobStore.class=org.quartz.simpl.RAMJobStore

#============================================================================
# JDBC Job Store Configuration (PostgreSQL - for production use)
# Requires: quartz_creation_postgres.sql executed on the database first.
# Note: In HyperIoT this used CMT+JNDI; Water uses direct JDBC (JobStoreTX).
#============================================================================
# org.quartz.jobStore.class=org.quartz.impl.jdbcjobstore.JobStoreTX
# org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
# org.quartz.jobStore.tablePrefix=QRTZ_
# org.quartz.jobStore.isClustered=false
# org.quartz.jobStore.dataSource=water
# org.quartz.dataSource.water.driver=org.postgresql.Driver
# org.quartz.dataSource.water.URL=jdbc:postgresql://localhost:5432/water
# org.quartz.dataSource.water.user=water
# org.quartz.dataSource.water.password=water
# org.quartz.dataSource.water.maxConnections=5

